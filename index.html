<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Your Business Name</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="Ruff_Favicon.png">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="Ruff Duff">
  <meta property="og:description" content="Smashing out visuals that slap.">
  <meta property="og:type" content="ruffduff.com">
  <meta property="og:url" content="https://ruffduffstuff.github.io/">
  <meta property="og:image" content="https://ruffduffstuff.github.io/Ruff_ShareImage.jpg">
  <meta property="og:image:alt" content="Ruff Duff">
  <meta property="og:site_name" content="Ruff Duff">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Business Name">
  <meta name="twitter:description" content="Short description of your business.">
  <meta name="twitter:image" content="https://yourusername.github.io/Ruff_ShareImage.jpg">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #007aff;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .logo {
      display: block;
      width: 220px;
      max-width: 100%;
      margin: 0 auto 20px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .buttons a {
      display: block;
      width: 220px;
      max-width: 100%;
    }

    .buttons img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.gif" alt="Your Business Logo" class="logo">

    <div class="buttons">
      <a
        href="https://instagram.com/ruffduffstuff"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="Button_MyWork.gif" alt="View My Work">
      </a>

      <a href="mailto:your@email.com">
        <img src="Button_Contact.gif" alt="Contact Me">
      </a>
    </div>
  </div>
</body>
</html>
