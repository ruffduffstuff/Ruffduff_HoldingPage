<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Business Name</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #007aff;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .logo {
      max-width: 220px;
      width: 100%;
      margin-bottom: 20px;
    }

    .socials a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .socials a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="Your Business Logo" class="logo">

    <h1>Coming Soon</h1>

    <p>Follow us for updates:</p>

    <div class="socials">
      <a href="https://instagram.com/ruffduffstuff">Instagram</a>
    </div>
  </div>
</body>
</html>
